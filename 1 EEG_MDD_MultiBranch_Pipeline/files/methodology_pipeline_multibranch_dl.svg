<svg width="100%" viewBox="0 0 680 1040" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: Arial, Helvetica, sans-serif; }
    .th  { font-size:14px; font-weight:600; }
    .ts  { font-size:12px; font-weight:400; }
    .arr { stroke:#6b7280; stroke-width:1.5; fill:none; }
    .c-blue   rect { fill:#dbeafe; stroke:#3b82f6; }
    .c-blue   text { fill:#1e3a8a; }
    .c-teal   rect { fill:#d1fae5; stroke:#0d9488; }
    .c-teal   text { fill:#064e3b; }
    .c-purple rect { fill:#ede9fe; stroke:#7c3aed; }
    .c-purple text { fill:#3b0764; }
    .c-coral  rect { fill:#fee2e2; stroke:#dc2626; }
    .c-coral  text { fill:#7f1d1d; }
    .c-green  rect { fill:#dcfce7; stroke:#16a34a; }
    .c-green  text { fill:#14532d; }
    .c-amber  rect { fill:#fef3c7; stroke:#d97706; }
    .c-amber  text { fill:#78350f; }
    .c-gray   rect { fill:#f3f4f6; stroke:#6b7280; }
    .c-gray   text { fill:#111827; }
  </style>
</defs>

<!-- INPUT -->
<g class="c-blue">
  <rect x="160" y="20" width="360" height="44" rx="22" stroke-width="0.5"/>
  <text class="th" x="340" y="42" text-anchor="middle" dominant-baseline="central">EDF files · 95 MDD + 84 HC · 179 subjects</text>
</g>
<line x1="340" y1="64" x2="340" y2="82" class="arr" marker-end="url(#arrow)"/>

<!-- PREPROCESSING -->
<rect x="50" y="84" width="580" height="230" rx="12" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="6 4"/>
<text class="ts" x="340" y="100" text-anchor="middle" dominant-baseline="central" fill="#555">Preprocessing pipeline</text>
<g class="c-teal">
  <rect x="68" y="108" width="544" height="40" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="128" text-anchor="middle" dominant-baseline="central">Re-reference · Common Average Reference</text>
</g>
<line x1="340" y1="148" x2="340" y2="156" class="arr" marker-end="url(#arrow)"/>
<g class="c-teal">
  <rect x="68" y="158" width="544" height="40" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="178" text-anchor="middle" dominant-baseline="central">Bandpass 0.5–45 Hz · Notch 50 Hz</text>
</g>
<line x1="340" y1="198" x2="340" y2="206" class="arr" marker-end="url(#arrow)"/>
<g class="c-teal">
  <rect x="68" y="208" width="544" height="40" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="228" text-anchor="middle" dominant-baseline="central">4-second epoch segmentation · reject |amp| &gt;= 100 uV</text>
</g>
<line x1="340" y1="248" x2="340" y2="256" class="arr" marker-end="url(#arrow)"/>
<g class="c-teal">
  <rect x="68" y="258" width="544" height="40" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="278" text-anchor="middle" dominant-baseline="central">Equalize recording duration · crop to min duration</text>
</g>
<line x1="340" y1="298" x2="340" y2="314" class="arr" marker-end="url(#arrow)"/>

<!-- EPOCH CHECKPOINT -->
<g class="c-amber">
  <rect x="160" y="316" width="360" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="330" text-anchor="middle" dominant-baseline="central">6,121 clean epochs · (6121, 19, 1024)</text>
  <text class="ts" x="340" y="348" text-anchor="middle" dominant-baseline="central">MDD = 2,854 · HC = 3,267 · 177 subjects · 4 s @ 256 Hz</text>
</g>

<!-- fan-out -->
<line x1="340" y1="360" x2="340" y2="376" class="arr"/>
<path d="M 340 376 L 120 376 L 120 398" fill="none" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
<path d="M 340 376 L 340 398" fill="none" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
<path d="M 340 376 L 558 376 L 558 398" fill="none" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arrow)"/>
<text class="ts" x="340" y="390" text-anchor="middle" dominant-baseline="central" fill="#555">Three parallel feature branches</text>

<!-- BRANCHES -->
<g class="c-purple">
  <rect x="34" y="400" width="172" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="120" y="414" text-anchor="middle" dominant-baseline="central">Branch 1 · LSTM</text>
  <text class="ts" x="120" y="432" text-anchor="middle" dominant-baseline="central">Temporal dynamics</text>
</g>
<g class="c-purple">
  <rect x="34" y="454" width="172" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="120" y="472" text-anchor="middle" dominant-baseline="central">Bi-LSTM x2 layers</text>
  <text class="ts" x="120" y="490" text-anchor="middle" dominant-baseline="central">hidden=128 · bidirectional</text>
  <text class="ts" x="120" y="506" text-anchor="middle" dominant-baseline="central">out: 256-dim</text>
</g>
<g class="c-coral">
  <rect x="254" y="400" width="172" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="414" text-anchor="middle" dominant-baseline="central">Branch 2 · 2D-CNN</text>
  <text class="ts" x="340" y="432" text-anchor="middle" dominant-baseline="central">Spatial scalp patterns</text>
</g>
<g class="c-coral">
  <rect x="254" y="454" width="172" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="472" text-anchor="middle" dominant-baseline="central">Conv2D x3 blocks</text>
  <text class="ts" x="340" y="490" text-anchor="middle" dominant-baseline="central">filters=32 · AdaptivePool</text>
  <text class="ts" x="340" y="506" text-anchor="middle" dominant-baseline="central">out: 128-dim</text>
</g>
<g class="c-green">
  <rect x="474" y="400" width="172" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="560" y="414" text-anchor="middle" dominant-baseline="central">Branch 3 · PLI</text>
  <text class="ts" x="560" y="432" text-anchor="middle" dominant-baseline="central">Connectivity graph</text>
</g>
<g class="c-green">
  <rect x="474" y="454" width="172" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="560" y="472" text-anchor="middle" dominant-baseline="central">FC on PLI features</text>
  <text class="ts" x="560" y="490" text-anchor="middle" dominant-baseline="central">171 pairs · alpha band</text>
  <text class="ts" x="560" y="506" text-anchor="middle" dominant-baseline="central">out: 128-dim</text>
</g>

<!-- fan-in -->
<line x1="120" y1="510" x2="120" y2="540" class="arr"/>
<line x1="340" y1="510" x2="340" y2="540" class="arr"/>
<line x1="560" y1="510" x2="560" y2="540" class="arr"/>
<path d="M 120 540 L 340 540" fill="none" stroke="#6b7280" stroke-width="1.5"/>
<path d="M 560 540 L 340 540" fill="none" stroke="#6b7280" stroke-width="1.5"/>
<line x1="340" y1="540" x2="340" y2="556" class="arr" marker-end="url(#arrow)"/>

<!-- FUSION -->
<g class="c-amber">
  <rect x="140" y="558" width="400" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="572" text-anchor="middle" dominant-baseline="central">Feature fusion · concatenation</text>
  <text class="ts" x="340" y="590" text-anchor="middle" dominant-baseline="central">256 + 128 + 128 = 512-dim · BatchNorm · Dropout(0.4)</text>
</g>
<line x1="340" y1="602" x2="340" y2="618" class="arr" marker-end="url(#arrow)"/>

<!-- CLASSIFIER HEAD -->
<g class="c-amber">
  <rect x="140" y="620" width="400" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="634" text-anchor="middle" dominant-baseline="central">Dense classifier head</text>
  <text class="ts" x="340" y="652" text-anchor="middle" dominant-baseline="central">512 to 128 to 1 · ReLU · BCEWithLogitsLoss</text>
</g>
<line x1="340" y1="664" x2="340" y2="680" class="arr" marker-end="url(#arrow)"/>

<!-- TRAINING -->
<g class="c-gray">
  <rect x="80" y="682" width="520" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="702" text-anchor="middle" dominant-baseline="central">Training · 940,833 parameters</text>
  <text class="ts" x="340" y="722" text-anchor="middle" dominant-baseline="central">Adam · LR=1e-3 · grad-clip 1.0 · early stopping · pos_weight per fold</text>
</g>
<line x1="340" y1="738" x2="340" y2="754" class="arr" marker-end="url(#arrow)"/>

<!-- CV -->
<g class="c-gray">
  <rect x="80" y="756" width="520" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="770" text-anchor="middle" dominant-baseline="central">Subject-wise 5-fold stratified CV</text>
  <text class="ts" x="340" y="788" text-anchor="middle" dominant-baseline="central">StandardScaler fitted inside fold · leakage-safe · SEED = 42</text>
</g>
<line x1="340" y1="800" x2="340" y2="816" class="arr" marker-end="url(#arrow)"/>

<!-- RESULTS -->
<rect x="50" y="818" width="580" height="184" rx="12" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="6 4"/>
<text class="ts" x="340" y="834" text-anchor="middle" dominant-baseline="central" fill="#555">Results · 5-fold CV (mean +/- std)</text>
<g class="c-blue">
  <rect x="66" y="842" width="96" height="144" rx="8" stroke-width="0.5"/>
  <text class="th" x="114" y="862" text-anchor="middle" dominant-baseline="central">Fold 1</text>
  <text class="ts" x="114" y="880" text-anchor="middle" dominant-baseline="central">Acc 94.0%</text>
  <text class="ts" x="114" y="896" text-anchor="middle" dominant-baseline="central">Sen 97.3%</text>
  <text class="ts" x="114" y="912" text-anchor="middle" dominant-baseline="central">Spe 90.8%</text>
  <text class="ts" x="114" y="928" text-anchor="middle" dominant-baseline="central">AUC 98.5%</text>
</g>
<g class="c-blue">
  <rect x="172" y="842" width="96" height="144" rx="8" stroke-width="0.5"/>
  <text class="th" x="220" y="862" text-anchor="middle" dominant-baseline="central">Fold 2</text>
  <text class="ts" x="220" y="880" text-anchor="middle" dominant-baseline="central">Acc 92.1%</text>
  <text class="ts" x="220" y="896" text-anchor="middle" dominant-baseline="central">Sen 88.2%</text>
  <text class="ts" x="220" y="912" text-anchor="middle" dominant-baseline="central">Spe 95.1%</text>
  <text class="ts" x="220" y="928" text-anchor="middle" dominant-baseline="central">AUC 98.0%</text>
</g>
<g class="c-blue">
  <rect x="278" y="842" width="96" height="144" rx="8" stroke-width="0.5"/>
  <text class="th" x="326" y="862" text-anchor="middle" dominant-baseline="central">Fold 3</text>
  <text class="ts" x="326" y="880" text-anchor="middle" dominant-baseline="central">Acc 93.1%</text>
  <text class="ts" x="326" y="896" text-anchor="middle" dominant-baseline="central">Sen 96.8%</text>
  <text class="ts" x="326" y="912" text-anchor="middle" dominant-baseline="central">Spe 89.5%</text>
  <text class="ts" x="326" y="928" text-anchor="middle" dominant-baseline="central">AUC 98.2%</text>
</g>
<g class="c-blue">
  <rect x="384" y="842" width="96" height="144" rx="8" stroke-width="0.5"/>
  <text class="th" x="432" y="862" text-anchor="middle" dominant-baseline="central">Fold 4</text>
  <text class="ts" x="432" y="880" text-anchor="middle" dominant-baseline="central">Acc 91.1%</text>
  <text class="ts" x="432" y="896" text-anchor="middle" dominant-baseline="central">Sen 91.0%</text>
  <text class="ts" x="432" y="912" text-anchor="middle" dominant-baseline="central">Spe 91.3%</text>
  <text class="ts" x="432" y="928" text-anchor="middle" dominant-baseline="central">AUC 97.6%</text>
</g>
<g class="c-blue">
  <rect x="490" y="842" width="96" height="144" rx="8" stroke-width="0.5"/>
  <text class="th" x="538" y="862" text-anchor="middle" dominant-baseline="central">Fold 5</text>
  <text class="ts" x="538" y="880" text-anchor="middle" dominant-baseline="central">Acc 92.1%</text>
  <text class="ts" x="538" y="896" text-anchor="middle" dominant-baseline="central">Sen 95.7%</text>
  <text class="ts" x="538" y="912" text-anchor="middle" dominant-baseline="central">Spe 89.3%</text>
  <text class="ts" x="538" y="928" text-anchor="middle" dominant-baseline="central">AUC 96.5%</text>
</g>
<rect x="66" y="990" width="520" height="3" rx="1" fill="#d1d5db"/>
<text class="th" x="340" y="1014" text-anchor="middle" dominant-baseline="central" fill="#374151">Mean +/- Std: Acc 92.48+/-1.10% · Sen 93.77+/-4.02% · Spe 91.18+/-2.35% · AUC 97.77+/-0.79%</text>
</svg>
