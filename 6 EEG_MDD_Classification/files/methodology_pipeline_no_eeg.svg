<svg width="100%" viewBox="0 0 680 806" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: Arial, Helvetica, sans-serif; }
    .th  { font-size:14px; font-weight:600; }
    .ts  { font-size:12px; font-weight:400; }
    .arr { stroke:#6b7280; stroke-width:1.5; fill:none; }
    .c-blue   rect { fill:#dbeafe; stroke:#3b82f6; }
    .c-blue   text { fill:#1e3a8a; }
    .c-teal   rect { fill:#d1fae5; stroke:#0d9488; }
    .c-teal   text { fill:#064e3b; }
    .c-purple rect { fill:#ede9fe; stroke:#7c3aed; }
    .c-purple text { fill:#3b0764; }
    .c-amber  rect { fill:#fef3c7; stroke:#d97706; }
    .c-amber  text { fill:#78350f; }
    .c-coral  rect { fill:#fee2e2; stroke:#dc2626; }
    .c-coral  text { fill:#7f1d1d; }
    .c-gray   rect { fill:#f3f4f6; stroke:#6b7280; }
    .c-gray   text { fill:#111827; }
  </style>
</defs>

<!-- Input -->
<g class="c-blue">
  <rect x="190" y="28" width="300" height="44" rx="22" stroke-width="0.5"/>
  <text class="th" x="340" y="50" text-anchor="middle" dominant-baseline="central">EDF files · MDD / healthy</text>
</g>
<line x1="340" y1="72" x2="340" y2="90" class="arr" marker-end="url(#arrow)"/>

<!-- Load EDF -->
<g class="c-teal">
  <rect x="100" y="92" width="480" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="112" text-anchor="middle" dominant-baseline="central">Load EDF files</text>
  <text class="ts" x="340" y="132" text-anchor="middle" dominant-baseline="central">95 MDD · 84 HC · 179 subjects · 19-ch and 4-ch configs</text>
</g>
<line x1="340" y1="148" x2="340" y2="164" class="arr" marker-end="url(#arrow)"/>

<!-- Preprocessing -->
<g class="c-teal">
  <rect x="100" y="166" width="480" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="186" text-anchor="middle" dominant-baseline="central">Preprocessing</text>
  <text class="ts" x="340" y="206" text-anchor="middle" dominant-baseline="central">Band-pass · 120s clean epochs · artefact rejection</text>
</g>
<line x1="340" y1="222" x2="340" y2="238" class="arr" marker-end="url(#arrow)"/>

<!-- Feature extraction container -->
<rect x="60" y="240" width="560" height="148" rx="12" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="6 4"/>
<text class="ts" x="340" y="256" text-anchor="middle" dominant-baseline="central" fill="#555">Feature extraction</text>

<g class="c-purple">
  <rect x="80" y="264" width="240" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="200" y="284" text-anchor="middle" dominant-baseline="central">Spectral power</text>
  <text class="ts" x="200" y="304" text-anchor="middle" dominant-baseline="central">Welch PSD · delta theta alpha beta</text>
</g>
<g class="c-purple">
  <rect x="360" y="264" width="240" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="480" y="284" text-anchor="middle" dominant-baseline="central">Alpha asymmetry</text>
  <text class="ts" x="480" y="304" text-anchor="middle" dominant-baseline="central">ln(R) - ln(L) per region pair</text>
</g>

<!-- Merge -->
<path d="M 200 320 L 200 378 L 340 378" fill="none" stroke="#6b7280" stroke-width="1.5"/>
<path d="M 480 320 L 480 378 L 340 378" fill="none" stroke="#6b7280" stroke-width="1.5"/>
<line x1="340" y1="378" x2="340" y2="400" class="arr" marker-end="url(#arrow)"/>

<!-- Feature matrix -->
<g class="c-teal">
  <rect x="100" y="402" width="480" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="422" text-anchor="middle" dominant-baseline="central">Feature matrix construction</text>
  <text class="ts" x="340" y="442" text-anchor="middle" dominant-baseline="central">Z-score normalise · 84 feat (19-ch) · 18 feat (4-ch)</text>
</g>
<line x1="340" y1="458" x2="340" y2="474" class="arr" marker-end="url(#arrow)"/>

<!-- AUC selection -->
<g class="c-amber">
  <rect x="100" y="476" width="480" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="496" text-anchor="middle" dominant-baseline="central">AUC-based feature selection</text>
  <text class="ts" x="340" y="516" text-anchor="middle" dominant-baseline="central">Univariate AUC ranking · subsets: top 5 / 10 / 15 / all</text>
</g>
<line x1="340" y1="532" x2="340" y2="548" class="arr" marker-end="url(#arrow)"/>

<!-- Classifiers container -->
<rect x="60" y="550" width="560" height="104" rx="12" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="6 4"/>
<text class="ts" x="340" y="566" text-anchor="middle" dominant-baseline="central" fill="#555">Monte Carlo CV · 100 x 10-fold stratified</text>

<g class="c-coral">
  <rect x="80" y="574" width="152" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="156" y="594" text-anchor="middle" dominant-baseline="central">LR</text>
  <text class="ts" x="156" y="614" text-anchor="middle" dominant-baseline="central">logistic regression</text>
</g>
<g class="c-coral">
  <rect x="264" y="574" width="152" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="594" text-anchor="middle" dominant-baseline="central">SVM</text>
  <text class="ts" x="340" y="614" text-anchor="middle" dominant-baseline="central">radial basis kernel</text>
</g>
<g class="c-coral">
  <rect x="448" y="574" width="152" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="524" y="594" text-anchor="middle" dominant-baseline="central">NB</text>
  <text class="ts" x="524" y="614" text-anchor="middle" dominant-baseline="central">Gaussian naive Bayes</text>
</g>

<line x1="340" y1="654" x2="340" y2="670" class="arr" marker-end="url(#arrow)"/>

<!-- Evaluation -->
<g class="c-gray">
  <rect x="100" y="672" width="480" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="692" text-anchor="middle" dominant-baseline="central">Evaluation</text>
  <text class="ts" x="340" y="712" text-anchor="middle" dominant-baseline="central">Accuracy · Sensitivity · Specificity · AUC</text>
</g>
<line x1="340" y1="728" x2="340" y2="744" class="arr" marker-end="url(#arrow)"/>

<!-- Output -->
<g class="c-blue">
  <rect x="170" y="746" width="340" height="44" rx="22" stroke-width="0.5"/>
  <text class="th" x="340" y="768" text-anchor="middle" dominant-baseline="central">EEG_MDD_results_summary.csv</text>
</g>
</svg>
