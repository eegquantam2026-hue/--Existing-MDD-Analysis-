<svg width="100%" viewBox="0 0 680 1014" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: Arial, Helvetica, sans-serif; }
    .th { font-size: 14px; font-weight: 600; fill: #1e3a5f; }
    .ts { font-size: 12px; font-weight: 400; fill: #4a6080; }
    .arr { stroke: #888; stroke-width: 1.5; fill: none; }
    /* Blue */
    .c-blue rect { fill: #dbeafe; stroke: #3b82f6; }
    .c-blue text { fill: #1e3a8a; }
    /* Teal */
    .c-teal rect { fill: #d1fae5; stroke: #0d9488; }
    .c-teal text { fill: #064e3b; }
    /* Amber */
    .c-amber rect { fill: #fef3c7; stroke: #d97706; }
    .c-amber text { fill: #78350f; }
    /* Purple */
    .c-purple rect { fill: #ede9fe; stroke: #7c3aed; }
    .c-purple text { fill: #3b0764; }
    /* Coral */
    .c-coral rect { fill: #fee2e2; stroke: #dc2626; }
    .c-coral text { fill: #7f1d1d; }
    /* Green */
    .c-green rect { fill: #dcfce7; stroke: #16a34a; }
    .c-green text { fill: #14532d; }
    /* Gray */
    .c-gray rect { fill: #f3f4f6; stroke: #6b7280; }
    .c-gray text { fill: #111827; }
  </style>
</defs>

<!-- EDF Input -->
<g class="c-blue">
  <rect x="190" y="28" width="300" height="44" rx="22" stroke-width="0.5"/>
  <text class="th" x="340" y="50" text-anchor="middle" dominant-baseline="central">EDF files · MDD / healthy</text>
</g>

<line x1="340" y1="72" x2="340" y2="90" class="arr" stroke="#888" marker-end="url(#arrow)"/>

<!-- Preprocessing box -->
<rect x="80" y="92" width="520" height="366" rx="12" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="6 4"/>
<text class="ts" x="340" y="108" text-anchor="middle" dominant-baseline="central">Preprocessing pipeline</text>

<g class="c-teal">
  <rect x="100" y="118" width="480" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="138" text-anchor="middle" dominant-baseline="central">Noise filtering &amp; band extraction</text>
  <text class="ts" x="340" y="158" text-anchor="middle" dominant-baseline="central">Notch 50 Hz · bandpass 0.5–45 Hz · resample 256 Hz</text>
</g>
<line x1="340" y1="174" x2="340" y2="184" class="arr" stroke="#0d9488" marker-end="url(#arrow)"/>

<g class="c-teal">
  <rect x="100" y="186" width="480" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="206" text-anchor="middle" dominant-baseline="central">Labelling</text>
  <text class="ts" x="340" y="226" text-anchor="middle" dominant-baseline="central">Normal = 1 · MDD = 0</text>
</g>
<line x1="340" y1="242" x2="340" y2="252" class="arr" stroke="#0d9488" marker-end="url(#arrow)"/>

<g class="c-teal">
  <rect x="100" y="254" width="480" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="274" text-anchor="middle" dominant-baseline="central">Z-score normalisation</text>
  <text class="ts" x="340" y="294" text-anchor="middle" dominant-baseline="central">Row-wise per epoch</text>
</g>
<line x1="340" y1="310" x2="340" y2="320" class="arr" stroke="#0d9488" marker-end="url(#arrow)"/>

<g class="c-teal">
  <rect x="100" y="322" width="480" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="342" text-anchor="middle" dominant-baseline="central">Mean imputation</text>
  <text class="ts" x="340" y="362" text-anchor="middle" dominant-baseline="central">Missing values</text>
</g>
<line x1="340" y1="378" x2="340" y2="388" class="arr" stroke="#0d9488" marker-end="url(#arrow)"/>

<g class="c-teal">
  <rect x="100" y="390" width="480" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="410" text-anchor="middle" dominant-baseline="central">SMOTE oversampling</text>
  <text class="ts" x="340" y="430" text-anchor="middle" dominant-baseline="central">Class imbalance correction</text>
</g>

<line x1="340" y1="458" x2="340" y2="468" class="arr" stroke="#888" marker-end="url(#arrow)"/>

<!-- Train-test split -->
<g class="c-amber">
  <rect x="190" y="470" width="300" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="492" text-anchor="middle" dominant-baseline="central">80 / 20 train-test split</text>
</g>

<line x1="340" y1="514" x2="340" y2="532" class="arr" stroke="#888" marker-end="url(#arrow)"/>

<!-- PSD Feature extraction -->
<rect x="40" y="534" width="600" height="94" rx="12" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="6 4"/>
<text class="ts" x="340" y="550" text-anchor="middle" dominant-baseline="central">PSD feature extraction · Welch method</text>

<g class="c-purple">
  <rect x="74" y="562" width="82" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="115" y="582" text-anchor="middle" dominant-baseline="central">δ Delta</text>
  <text class="ts" x="115" y="600" text-anchor="middle" dominant-baseline="central">0.5–4 Hz</text>
</g>
<g class="c-purple">
  <rect x="164" y="562" width="82" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="205" y="582" text-anchor="middle" dominant-baseline="central">θ Theta</text>
  <text class="ts" x="205" y="600" text-anchor="middle" dominant-baseline="central">4–8 Hz</text>
</g>
<g class="c-purple">
  <rect x="254" y="562" width="82" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="295" y="582" text-anchor="middle" dominant-baseline="central">α Alpha</text>
  <text class="ts" x="295" y="600" text-anchor="middle" dominant-baseline="central">8–12 Hz</text>
</g>
<g class="c-purple">
  <rect x="344" y="562" width="82" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="385" y="582" text-anchor="middle" dominant-baseline="central">β Beta</text>
  <text class="ts" x="385" y="600" text-anchor="middle" dominant-baseline="central">13–30 Hz</text>
</g>
<g class="c-purple">
  <rect x="434" y="562" width="82" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="475" y="582" text-anchor="middle" dominant-baseline="central">γ Gamma</text>
  <text class="ts" x="475" y="600" text-anchor="middle" dominant-baseline="central">30–45 Hz</text>
</g>
<g class="c-purple">
  <rect x="524" y="562" width="82" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="565" y="582" text-anchor="middle" dominant-baseline="central">Entropy</text>
  <text class="ts" x="565" y="600" text-anchor="middle" dominant-baseline="central">Spectral</text>
</g>

<line x1="340" y1="628" x2="340" y2="646" class="arr" stroke="#888" marker-end="url(#arrow)"/>

<!-- Labels -->
<text class="ts" x="180" y="657" text-anchor="middle" dominant-baseline="central">Classical ML</text>
<text class="ts" x="500" y="657" text-anchor="middle" dominant-baseline="central">Deep learning</text>

<!-- Classical ML box -->
<rect x="24" y="666" width="312" height="174" rx="12" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="6 4"/>
<g class="c-coral">
  <rect x="34" y="678" width="292" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="180" y="700" text-anchor="middle" dominant-baseline="central">Random forest</text>
</g>
<g class="c-coral">
  <rect x="34" y="732" width="292" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="180" y="754" text-anchor="middle" dominant-baseline="central">Gradient boosting</text>
</g>
<g class="c-coral">
  <rect x="34" y="786" width="292" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="180" y="808" text-anchor="middle" dominant-baseline="central">K-nearest neighbours</text>
</g>

<!-- Deep learning box -->
<rect x="344" y="666" width="312" height="120" rx="12" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="6 4"/>
<g class="c-green">
  <rect x="354" y="678" width="292" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="500" y="700" text-anchor="middle" dominant-baseline="central">LSTM · 3 stacked layers</text>
</g>
<g class="c-green">
  <rect x="354" y="732" width="292" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="500" y="754" text-anchor="middle" dominant-baseline="central">LRCN · CNN + LSTM</text>
</g>

<!-- Merge arrows -->
<path d="M 180 840 L 180 858 L 340 858" fill="none" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<path d="M 500 786 L 500 858 L 340 858" fill="none" stroke="#888" stroke-width="1.5" marker-end="url(#arrow)"/>
<line x1="340" y1="858" x2="340" y2="874" class="arr" stroke="#888" marker-end="url(#arrow)"/>

<!-- Evaluation -->
<g class="c-gray">
  <rect x="140" y="876" width="400" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="896" text-anchor="middle" dominant-baseline="central">Evaluation metrics</text>
  <text class="ts" x="340" y="916" text-anchor="middle" dominant-baseline="central">Accuracy · Precision · Recall · F1 · ROC-AUC</text>
</g>

<line x1="340" y1="932" x2="340" y2="950" class="arr" stroke="#888" marker-end="url(#arrow)"/>

<!-- Saved artefacts -->
<g class="c-blue">
  <rect x="190" y="952" width="300" height="44" rx="22" stroke-width="0.5"/>
  <text class="th" x="340" y="974" text-anchor="middle" dominant-baseline="central">Saved artefacts · .pkl / .pth</text>
</g>
</svg>
