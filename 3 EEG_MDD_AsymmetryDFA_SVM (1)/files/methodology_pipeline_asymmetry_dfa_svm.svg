<svg width="100%" viewBox="0 0 680 1080" xmlns="http://www.w3.org/2000/svg">
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#6b7280" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
  <style>
    text { font-family: Arial, Helvetica, sans-serif; }
    .th  { font-size:14px; font-weight:600; }
    .ts  { font-size:12px; font-weight:400; }
    .arr { stroke:#6b7280; stroke-width:1.5; fill:none; }
    .c-blue   rect { fill:#dbeafe; stroke:#3b82f6; }
    .c-blue   text { fill:#1e3a8a; }
    .c-teal   rect { fill:#d1fae5; stroke:#0d9488; }
    .c-teal   text { fill:#064e3b; }
    .c-purple rect { fill:#ede9fe; stroke:#7c3aed; }
    .c-purple text { fill:#3b0764; }
    .c-coral  rect { fill:#fee2e2; stroke:#dc2626; }
    .c-coral  text { fill:#7f1d1d; }
    .c-amber  rect { fill:#fef3c7; stroke:#d97706; }
    .c-amber  text { fill:#78350f; }
    .c-green  rect { fill:#dcfce7; stroke:#16a34a; }
    .c-green  text { fill:#14532d; }
    .c-gray   rect { fill:#f3f4f6; stroke:#6b7280; }
    .c-gray   text { fill:#111827; }
  </style>
</defs>

<g class="c-blue">
  <rect x="160" y="20" width="360" height="44" rx="22" stroke-width="0.5"/>
  <text class="th" x="340" y="42" text-anchor="middle" dominant-baseline="central">EDF files · 95 MDD + 84 HC · 179 subjects</text>
</g>
<line x1="340" y1="64" x2="340" y2="82" class="arr" marker-end="url(#arrow)"/>

<rect x="50" y="84" width="580" height="272" rx="12" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="6 4"/>
<text class="ts" x="340" y="100" text-anchor="middle" dominant-baseline="central" fill="#555">Preprocessing pipeline</text>

<g class="c-teal">
  <rect x="70" y="108" width="540" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="130" text-anchor="middle" dominant-baseline="central">Resample to 256 Hz</text>
</g>
<line x1="340" y1="152" x2="340" y2="162" class="arr" marker-end="url(#arrow)"/>
<g class="c-teal">
  <rect x="70" y="164" width="540" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="186" text-anchor="middle" dominant-baseline="central">Bandpass 0.5–32 Hz · Notch 50 Hz</text>
</g>
<line x1="340" y1="208" x2="340" y2="218" class="arr" marker-end="url(#arrow)"/>
<g class="c-teal">
  <rect x="70" y="220" width="540" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="242" text-anchor="middle" dominant-baseline="central">Common average reference (CAR)</text>
</g>
<line x1="340" y1="264" x2="340" y2="274" class="arr" marker-end="url(#arrow)"/>
<g class="c-teal">
  <rect x="70" y="276" width="540" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="298" text-anchor="middle" dominant-baseline="central">ICA eyeblink removal · 15 components</text>
</g>
<line x1="340" y1="320" x2="340" y2="330" class="arr" marker-end="url(#arrow)"/>
<g class="c-teal">
  <rect x="70" y="332" width="540" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="354" text-anchor="middle" dominant-baseline="central">2-second epoch segmentation · amplitude reject ±100 µV</text>
</g>

<line x1="340" y1="356" x2="340" y2="374" class="arr" marker-end="url(#arrow)"/>
<g class="c-amber">
  <rect x="170" y="376" width="340" height="44" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="390" text-anchor="middle" dominant-baseline="central">34,060 clean epochs</text>
  <text class="ts" x="340" y="408" text-anchor="middle" dominant-baseline="central">MDD = 17,841 · HC = 16,219 · rejected = 2,592</text>
</g>
<line x1="340" y1="420" x2="340" y2="438" class="arr" marker-end="url(#arrow)"/>

<rect x="50" y="440" width="580" height="130" rx="12" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="6 4"/>
<text class="ts" x="340" y="456" text-anchor="middle" dominant-baseline="central" fill="#555">Feature extraction per epoch</text>
<g class="c-purple">
  <rect x="70" y="464" width="258" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="199" y="484" text-anchor="middle" dominant-baseline="central">Linear · asymmetry index</text>
  <text class="ts" x="199" y="504" text-anchor="middle" dominant-baseline="central">delta · alpha · beta band power pairs</text>
</g>
<g class="c-purple">
  <rect x="352" y="464" width="258" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="481" y="484" text-anchor="middle" dominant-baseline="central">Nonlinear · DFA exponent</text>
  <text class="ts" x="481" y="504" text-anchor="middle" dominant-baseline="central">scaling alpha per channel · 8 log-spaced scales</text>
</g>

<path d="M 199 520 L 199 548 L 340 548" fill="none" stroke="#6b7280" stroke-width="1.5"/>
<path d="M 481 520 L 481 548 L 340 548" fill="none" stroke="#6b7280" stroke-width="1.5"/>
<line x1="340" y1="548" x2="340" y2="565" class="arr" marker-end="url(#arrow)"/>

<g class="c-amber">
  <rect x="210" y="568" width="260" height="36" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="586" text-anchor="middle" dominant-baseline="central">Min-Max normalisation (inside CV fold)</text>
</g>
<line x1="340" y1="604" x2="340" y2="622" class="arr" marker-end="url(#arrow)"/>

<rect x="50" y="624" width="580" height="108" rx="12" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="6 4"/>
<text class="ts" x="340" y="640" text-anchor="middle" dominant-baseline="central" fill="#555">Three channel configurations</text>
<g class="c-coral">
  <rect x="62" y="650" width="172" height="68" rx="8" stroke-width="0.5"/>
  <text class="th" x="148" y="670" text-anchor="middle" dominant-baseline="central">Model 1</text>
  <text class="ts" x="148" y="688" text-anchor="middle" dominant-baseline="central">All 19 channels</text>
  <text class="ts" x="148" y="704" text-anchor="middle" dominant-baseline="central">43 features</text>
</g>
<g class="c-coral">
  <rect x="254" y="650" width="172" height="68" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="670" text-anchor="middle" dominant-baseline="central">Model 2</text>
  <text class="ts" x="340" y="688" text-anchor="middle" dominant-baseline="central">6 ch · F7 F8 T3 T4 T5 T6</text>
  <text class="ts" x="340" y="704" text-anchor="middle" dominant-baseline="central">15 features</text>
</g>
<g class="c-green">
  <rect x="446" y="650" width="172" height="68" rx="8" stroke-width="0.5"/>
  <text class="th" x="532" y="670" text-anchor="middle" dominant-baseline="central">Model 3 (recommended)</text>
  <text class="ts" x="532" y="688" text-anchor="middle" dominant-baseline="central">4 ch · Fp1 Fp2 F3 F4</text>
  <text class="ts" x="532" y="704" text-anchor="middle" dominant-baseline="central">10 features · portable</text>
</g>

<line x1="148" y1="718" x2="148" y2="750" class="arr"/>
<line x1="340" y1="718" x2="340" y2="750" class="arr"/>
<line x1="532" y1="718" x2="532" y2="750" class="arr"/>
<path d="M 148 750 L 340 750" fill="none" stroke="#6b7280" stroke-width="1.5"/>
<path d="M 532 750 L 340 750" fill="none" stroke="#6b7280" stroke-width="1.5"/>
<line x1="340" y1="750" x2="340" y2="766" class="arr" marker-end="url(#arrow)"/>

<g class="c-coral">
  <rect x="100" y="768" width="480" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="788" text-anchor="middle" dominant-baseline="central">SVM · Gaussian (RBF) kernel</text>
  <text class="ts" x="340" y="808" text-anchor="middle" dominant-baseline="central">C=1 · gamma=scale · class_weight=balanced · 100 × 10-fold CV · 70/30 split</text>
</g>
<line x1="340" y1="824" x2="340" y2="842" class="arr" marker-end="url(#arrow)"/>

<g class="c-gray">
  <rect x="100" y="844" width="480" height="56" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="864" text-anchor="middle" dominant-baseline="central">Evaluation</text>
  <text class="ts" x="340" y="884" text-anchor="middle" dominant-baseline="central">Accuracy · Sensitivity · Specificity · F1-Score</text>
</g>
<line x1="340" y1="900" x2="340" y2="918" class="arr" marker-end="url(#arrow)"/>

<rect x="50" y="920" width="580" height="120" rx="12" fill="none" stroke="#aaa" stroke-width="1" stroke-dasharray="6 4"/>
<text class="ts" x="340" y="936" text-anchor="middle" dominant-baseline="central" fill="#555">Results · mean ± std across 1,000 folds</text>

<g class="c-coral">
  <rect x="66" y="946" width="166" height="80" rx="8" stroke-width="0.5"/>
  <text class="th" x="149" y="966" text-anchor="middle" dominant-baseline="central">Model 1 · 19-ch</text>
  <text class="ts" x="149" y="984" text-anchor="middle" dominant-baseline="central">Acc  93.93 ± 0.41%</text>
  <text class="ts" x="149" y="1000" text-anchor="middle" dominant-baseline="central">Sen  94.50 ± 0.55%</text>
  <text class="ts" x="149" y="1016" text-anchor="middle" dominant-baseline="central">Spe  93.30 ± 0.64%</text>
</g>
<g class="c-coral">
  <rect x="257" y="946" width="166" height="80" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="966" text-anchor="middle" dominant-baseline="central">Model 2 · 6-ch</text>
  <text class="ts" x="340" y="984" text-anchor="middle" dominant-baseline="central">Acc  87.39 ± 0.54%</text>
  <text class="ts" x="340" y="1000" text-anchor="middle" dominant-baseline="central">Sen  87.85 ± 0.77%</text>
  <text class="ts" x="340" y="1016" text-anchor="middle" dominant-baseline="central">Spe  86.89 ± 0.85%</text>
</g>
<g class="c-green">
  <rect x="448" y="946" width="166" height="80" rx="8" stroke-width="0.5"/>
  <text class="th" x="531" y="966" text-anchor="middle" dominant-baseline="central">Model 3 · 4-ch</text>
  <text class="ts" x="531" y="984" text-anchor="middle" dominant-baseline="central">Acc  84.79 ± 0.58%</text>
  <text class="ts" x="531" y="1000" text-anchor="middle" dominant-baseline="central">Sen  87.92 ± 0.79%</text>
  <text class="ts" x="531" y="1016" text-anchor="middle" dominant-baseline="central">Spe  81.35 ± 0.99%</text>
</g>
</svg>
